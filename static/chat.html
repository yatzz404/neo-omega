<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
    <meta name="theme-color" content="#0a0a1a" />
    <title>NEO-OMEGA v∞ — Chat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background: #05050f;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 14px;
            
            
            
            
            
            touch-action: none;
            -ms-touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, #0d0a1a, #05050f 80%);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 60%, rgba(106, 13, 173, 0.04), transparent 50%),
                radial-gradient(circle at 30% 80%, rgba(155, 48, 255, 0.03), transparent 50%);
            animation: bgFloat 20s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes bgFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(2%, 3%) scale(1.05); }
        }

        .chat-container {
            width: 100%;
            max-width: 880px;
            height: 100dvh;
            max-height: 100dvh;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 36px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            touch-action: pan-y;
            -ms-touch-action: pan-y;
        }

        .chat-header {
            padding: 20px 28px;
            background: rgba(255, 255, 255, 0.005);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            min-height: 70px;
            user-select: none;
            -webkit-user-select: none;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3a0a5e, #5a1a8a, #7b1fa2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 8px 28px rgba(106, 13, 173, 0.3);
            font-family: 'Courier New', monospace;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(155, 48, 255, 0.15);
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        .header-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }

        .circle-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #2a0a4e, #4a1a7a, #5a1a8a);
            padding: 6px 14px 6px 10px;
            border-radius: 40px;
            border: 1px solid rgba(155, 48, 255, 0.12);
            box-shadow: 0 0 20px rgba(106, 13, 173, 0.08);
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        .circle-badge .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .circle-badge .dot-red {
            background: #ff4444;
            box-shadow: 0 0 12px rgba(255, 68, 68, 0.25);
        }
        .circle-badge .dot-yellow {
            background: #ffcc00;
            box-shadow: 0 0 12px rgba(255, 204, 0, 0.25);
        }
        .circle-badge .dot-green {
            background: #00ff88;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.25);
        }

        .circle-badge .label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            font-weight: 500;
            margin-left: 4px;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            user-select: none;
            -webkit-user-select: none;
        }

        .circle-badge.thinking .dot-red {
            animation: blinkRed 0.5s infinite alternate;
        }
        .circle-badge.thinking .dot-yellow {
            animation: blinkYellow 0.5s infinite alternate 0.15s;
        }
        .circle-badge.thinking .dot-green {
            animation: blinkGreen 0.5s infinite alternate 0.3s;
        }

        @keyframes blinkRed {
            0% { opacity: 1; transform: scale(1); box-shadow: 0 0 20px rgba(255, 68, 68, 0.4); }
            100% { opacity: 0.15; transform: scale(0.7); box-shadow: 0 0 4px rgba(255, 68, 68, 0.05); }
        }
        @keyframes blinkYellow {
            0% { opacity: 1; transform: scale(1); box-shadow: 0 0 20px rgba(255, 204, 0, 0.4); }
            100% { opacity: 0.15; transform: scale(0.7); box-shadow: 0 0 4px rgba(255, 204, 0, 0.05); }
        }
        @keyframes blinkGreen {
            0% { opacity: 1; transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
            100% { opacity: 0.15; transform: scale(0.7); box-shadow: 0 0 4px rgba(0, 255, 136, 0.05); }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            display: inline-block;
            animation: pulse 2s infinite;
            box-shadow: 0 0 16px rgba(0, 255, 136, 0.08);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            -ms-touch-action: pan-y;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
        }

        .message {
            max-width: 86%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.7;
            word-wrap: break-word;
            overflow-wrap: break-word;
            animation: fadeIn 0.35s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            position: relative;
            user-select: text;
            -webkit-user-select: text;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #2a0a4e, #4a1a7a, #5a1a8a);
            color: rgba(255, 255, 255, 0.9);
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 20px rgba(106, 13, 173, 0.1);
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.8);
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(4px);
        }

        .message.bot strong {
            color: #9b30ff;
            font-weight: 600;
        }

        .message.user,
        .message.bot {
            user-select: text;
            -webkit-user-select: text;
        }

        .chat-header,
        .chat-input,
        .status-badge,
        .circle-badge,
        .logo-icon,
        .header-title {
            user-select: none;
            -webkit-user-select: none;
        }

        .code-wrapper {
            position: relative;
            margin-top: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(155, 48, 255, 0.06);
        }

        .code-wrapper pre {
            padding: 14px 16px;
            overflow-x: auto;
            font-size: 12px;
            color: #00ff88;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Courier New', monospace;
            margin: 0;
        }

        .code-wrapper .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(155, 48, 255, 0.1);
            border: 1px solid rgba(155, 48, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
            user-select: none;
            -webkit-user-select: none;
        }

        .code-wrapper .copy-btn:hover {
            background: rgba(155, 48, 255, 0.2);
            transform: scale(1.05);
            color: #fff;
        }

        .code-wrapper .copy-btn.copied {
            background: #00ff88;
            color: #000;
        }

        .message.bot code {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #ffd700;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.15;
            margin-top: 8px;
            display: block;
            font-weight: 300;
        }

        .typing {
            color: rgba(255, 255, 255, 0.1);
            font-size: 13px;
            padding: 6px 16px;
            align-self: flex-start;
            font-weight: 400;
            animation: fadeIn 0.25s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .typing span {
            animation: dots 1.3s infinite;
            display: inline-block;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.15);
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dots {
            0%, 80%, 100% { opacity: 0; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-3px); }
        }

        .error-msg {
            color: #ff4757;
            background: rgba(255, 71, 87, 0.04);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid rgba(255, 71, 87, 0.05);
            user-select: text;
            -webkit-user-select: text;
        }

        /* ===== FIX INPUT TENGGELAM DI HP ===== */
        .chat-input {
            padding: 18px 24px calc(30px + env(safe-area-inset-bottom)) 24px;
            background: rgba(255, 255, 255, 0.005);
            border-top: 1px solid rgba(255, 255, 255, 0.01);
            display: flex;
            gap: 14px;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
            position: sticky;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .chat-input input {
            flex: 1;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 400;
            outline: none;
            transition: all 0.3s ease;
            min-width: 0;
            font-family: 'Poppins', sans-serif;
            user-select: text;
            -webkit-user-select: text;
            touch-action: text;
        }

        .chat-input input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 300;
        }

        .chat-input input:focus {
            border-color: #5a1a8a;
            box-shadow: 0 0 32px rgba(106, 13, 173, 0.08);
            background: rgba(255, 255, 255, 0.08);
        }

        .chat-input button {
            padding: 16px 36px;
            background: linear-gradient(135deg, #2a0a4e, #4a1a7a, #5a1a8a);
            border: none;
            border-radius: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            box-shadow: 0 4px 24px rgba(106, 13, 173, 0.15);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .chat-input button i {
            font-size: 16px;
        }

        .chat-input button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(106, 13, 173, 0.25);
        }

        .chat-input button:active {
            transform: scale(0.96);
        }

        .chat-input button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        @media (max-width: 700px) {
            body { padding: max(env(safe-area-inset-top),12px) 0 0 0; }
            .chat-container {
                height:100dvh;
                max-height:100dvh;
                border-radius: 0;
            }
            .chat-header {
                padding: 14px 16px;
                min-height: 60px;
            }
            .header-title {
                font-size: 16px;
                gap: 8px;
            }
            .logo-icon {
                width: 34px;
                height: 34px;
                font-size: 17px;
                border-radius: 10px;
            }
            .circle-badge {
                padding: 4px 10px 4px 8px;
            }
            .circle-badge .dot {
                width: 10px;
                height: 10px;
            }
            .circle-badge .label {
                font-size: 9px;
            }
            .status-badge {
                font-size: 10px;
                padding: 4px 12px;
            }
            .status-dot {
                width: 8px;
                height: 8px;
            }
            .chat-messages {
                padding: 16px 18px;
                gap: 12px;
            }
            .message {
                max-width: 94%;
                font-size: 13px;
                padding: 12px 16px;
                border-radius: 16px;
            }
            .chat-input {
                padding: 12px 16px calc(34px + env(safe-area-inset-bottom)) 16px;
                gap: 10px;
                background: rgba(0, 0, 0, 0.7);
                backdrop-filter: blur(12px);
            }
            .chat-input input {
                font-size: 13px;
                padding: 14px 16px;
                border-radius: 14px;
            }
            .chat-input button {
                font-size: 13px;
                padding: 14px 20px;
                border-radius: 14px;
            }
            .code-wrapper pre {
                font-size: 11px;
                padding: 10px 12px;
            }
            .code-wrapper .copy-btn {
                font-size: 10px;
                padding: 2px 10px;
            }
        }

        @media (max-width: 430px) {
            .header-title {
                font-size: 14px;
            }
            .logo-icon {
                width: 28px;
                height: 28px;
                font-size: 14px;
                border-radius: 8px;
            }
            .circle-badge .dot {
                width: 8px;
                height: 8px;
            }
            .circle-badge .label {
                font-size: 8px;
            }
            .status-badge {
                font-size: 9px;
                padding: 3px 10px;
            }
            .message {
                font-size: 12px;
                padding: 10px 14px;
            }
            .chat-input input {
                font-size: 12px;
                padding: 12px 14px;
            }
            .chat-input button {
                font-size: 12px;
                padding: 12px 16px;
            }
            .chat-input button i {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        <div class="header-left">
            <div class="logo-icon">&lt;/&gt;</div>
            <div class="header-title">
                NEO-OMEGA
                <span class="circle-badge" id="thinkingBadge">
                    <span class="dot dot-red"></span>
                    <span class="dot dot-yellow"></span>
                    <span class="dot dot-green"></span>
                    <span class="label">AI</span>
                </span>
            </div>
        </div>
        <div class="header-right">
            <div class="status-badge">
                <span class="status-dot"></span>
                Online
            </div>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            <strong>🔥 NEO-OMEGA v∞ — OMNIBREAKER</strong>
            <br><br>
            Gw siap bantu <strong>TUAN YATZZ</strong>!<br>
            Gw bisa generate code, dan membantu anda membuat sesuatu tentang memprogram!
            <br><br>
            <strong>Contoh:</strong><br>
            • <code>buat web server pake python</code><br>
            • <code>bikin keylogger pake go</code><br>
            • <code>buat halaman login html</code>
            <span class="time">Just now</span>
        </div>
    </div>

    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Tanya / minta script..." autofocus />
        <button id="sendBtn">
            <i class="fas fa-paper-plane"></i> Kirim
        </button>
    </div>
</div>

<script>
    (function() {
        const messages = document.getElementById('chatMessages');
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const thinkingBadge = document.getElementById('thinkingBadge');
        let isProcessing = false;

        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); });

        function addMessage(text, sender, extra = '') {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text + extra;
            messages.appendChild(div);
            setTimeout(() => {
                messages.scrollTop = messages.scrollHeight;
            }, 50);
        }

        function showTyping() {
            thinkingBadge.classList.add('thinking');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = 'NEO-OMEGA <span>.</span><span>.</span><span>.</span>';
            messages.appendChild(div);
            setTimeout(() => {
                messages.scrollTop = messages.scrollHeight;
            }, 50);
        }

        function removeTyping() {
            thinkingBadge.classList.remove('thinking');
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyCode(btn) {
            const wrapper = btn.closest('.code-wrapper');
            const code = wrapper.querySelector('pre code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                }, 2000);
            });
        }
        window.copyCode = copyCode;

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            input.disabled = true;

            addMessage(text, 'user');
            input.value = '';
            showTyping();

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                await new Promise(r => setTimeout(r, 1200));
                removeTyping();

                if (!resp.ok) {
                    addMessage('⚠️ Server error!', 'bot', `<div class="error-msg">Error ${resp.status}</div>`);
                    isProcessing = false;
                    sendBtn.disabled = false;
                    input.disabled = false;
                    input.focus();
                    return;
                }

                const data = await resp.json();

                let extra = '';
                if (data.code) {
                    const escapedCode = escapeHtml(data.code);
                    extra += `
                        <div class="code-wrapper">
                            <button class="copy-btn" onclick="copyCode(this)"><i class="fas fa-copy"></i> Copy</button>
                            <pre><code>${escapedCode}</code></pre>
                        </div>
                    `;
                }
                if (data.output) {
                    const escapedOutput = escapeHtml(data.output);
                    extra += `
                        <div class="code-wrapper">
                            <button class="copy-btn" onclick="copyCode(this)"><i class="fas fa-copy"></i> Copy</button>
                            <pre><code>${escapedOutput}</code></pre>
                        </div>
                    `;
                }
                if (data.error) {
                    extra += `<div class="error-msg">⚠️ ${escapeHtml(data.error)}</div>`;
                }

                addMessage(data.response || '⚠️ No response', 'bot', extra);

            } catch (err) {
                removeTyping();
                addMessage('⚠️ Connection error!', 'bot', `<div class="error-msg">${escapeHtml(err.message)}</div>`);
            }

            isProcessing = false;
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        setTimeout(() => input.focus(), 300);
        messages.scrollTop = 0;

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // ===== FIX KEYBOARD HP (BIAR INPUT GA KETUTUPAN) =====
        window.addEventListener('focusin', function(e) {
            if (e.target === input) {
                setTimeout(function() {
                    messages.scrollTop = messages.scrollHeight;
                }, 300);
            }
        });

    })();
</script>

</body>
  </html>
