name: Auto-Learn NEO OMEGA AI

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  auto-learn:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4
    
    - name: Run Auto-Learn
      run: |
        python3 auto_learn_github.py
    
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add auto_memory.json
        git diff --staged --quiet || git commit -m "Auto-learn update"
        git push
